name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach assets to (e.g. v0.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Build
        env:
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo build --release -p screencap-cli -p screencap-gui

      - name: Package
        shell: pwsh
        run: |
          $zip = "screencap-rs-$env:TAG-windows-x86_64.zip"
          $bin = "target/x86_64-pc-windows-msvc/release"
          Compress-Archive -Path "$bin/screencap-cli.exe", "$bin/screencap.exe" -DestinationPath $zip
          echo "ZIP=$zip" >> $env:GITHUB_ENV
          $cli = "screencap-cli-$env:TAG-windows-x86_64.exe"
          Copy-Item "$bin/screencap-cli.exe" $cli
          echo "CLI=$cli" >> $env:GITHUB_ENV

      - name: Verify packaged --version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $cli = $env:CLI
          $out = & ".\$cli" --version
          if ($LASTEXITCODE -ne 0) { throw "packaged --version exit=$LASTEXITCODE" }
          if ($out -notmatch '^screencap-cli\s+\d+\.\d+\.\d+') {
            throw "unexpected packaged --version: $out"
          }
          Write-Host "packaged version: $out"

      - name: SHA256 checksums
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $files = @($env:ZIP, $env:CLI)
          $lines = foreach ($f in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $f).Hash.ToLowerInvariant()
            "{0}  {1}" -f $hash, $f
          }
          $sum = "SHA256SUMS.txt"
          $lines | Set-Content -Path $sum -Encoding ascii
          Get-Content $sum
          echo "SUMS=$sum" >> $env:GITHUB_ENV

      - name: Upload to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$env:TAG" *> $null || gh release create "$env:TAG" --title "$env:TAG" --generate-notes
          gh release upload "$env:TAG" "$env:ZIP" "$env:CLI" "$env:SUMS" --clobber
