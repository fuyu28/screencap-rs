name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        run: rustup component add rustfmt clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Build CLI (smoke)
        run: cargo build -p screencap-cli

      - name: Smoke — binary contract
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bin = "target/x86_64-pc-windows-msvc/debug/screencap-cli.exe"
          if (-not (Test-Path $bin)) { throw "missing binary: $bin" }

          # --version: exit 0, no side effects beyond stdout
          $ver = & $bin --version
          if ($LASTEXITCODE -ne 0) { throw "--version exit=$LASTEXITCODE" }
          if ($ver -notmatch '^screencap-cli\s+\d+\.\d+\.\d+') {
            throw "unexpected --version output: $ver"
          }

          # list windows --json: exit 0 + parseable shape
          $lw = & $bin list windows --json --no-log | Out-String
          if ($LASTEXITCODE -ne 0) { throw "list windows --json exit=$LASTEXITCODE`n$lw" }
          $lwj = $lw | ConvertFrom-Json
          if (-not $lwj.ok) { throw "list windows ok=false: $lw" }
          if ($lwj.command -ne "list windows") { throw "list windows command=$($lwj.command)" }
          if ($null -eq $lwj.windows) { throw "list windows missing windows array" }

          # list monitors --json: exit 0 + parseable shape
          $lm = & $bin list monitors --json --no-log | Out-String
          if ($LASTEXITCODE -ne 0) { throw "list monitors --json exit=$LASTEXITCODE`n$lm" }
          $lmj = $lm | ConvertFrom-Json
          if (-not $lmj.ok) { throw "list monitors ok=false: $lm" }
          if ($lmj.command -ne "list monitors") { throw "list monitors command=$($lmj.command)" }
          if ($null -eq $lmj.monitors) { throw "list monitors missing monitors array" }

          # invalid args: exit 2 (clap / validation)
          & $bin cap --method not-a-method --foreground --out smoke.png --no-log 2>$null | Out-Null
          if ($LASTEXITCODE -ne 2) { throw "invalid method expected exit 2, got $LASTEXITCODE" }

          # --json + parse failure: exit 2 + failure-shaped JSON (command=unknown)
          $fail = & $bin --json cap --method not-a-method --foreground --out smoke.png --no-log 2>$null | Out-String
          if ($LASTEXITCODE -ne 2) { throw "--json invalid method expected exit 2, got $LASTEXITCODE`n$fail" }
          $fj = $fail | ConvertFrom-Json
          if ($fj.ok -ne $false) { throw "--json failure ok should be false: $fail" }
          if ($fj.command -ne "unknown") { throw "--json failure command=$($fj.command)" }
          if ($null -eq $fj.error -or [string]::IsNullOrEmpty($fj.error.message)) {
            throw "--json failure missing error.message: $fail"
          }
          foreach ($k in @("window", "monitor", "crop", "image_stats")) {
            if ($null -ne $fj.$k) { throw "--json failure $k should be null: $fail" }
          }

          Write-Host "smoke ok"
